name: Pages

# Publishes the pre-generated example reports (docs/examples/) to GitHub Pages. The reports are
# committed HTML (built with real API keys via scripts/build_example_reports.py, not in CI) — this
# workflow only uploads them, so it needs no secrets and no heavy install.

on:
  push:
    branches: [main]
    paths: ["docs/examples/**"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/examples
      - id: deployment
        uses: actions/deploy-pages@v4
